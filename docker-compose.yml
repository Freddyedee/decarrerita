services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: decarrerita
      POSTGRES_PASSWORD: decarrerita_dev
      POSTGRES_DB: decarrerita_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U decarrerita -d decarrerita_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    user: "node"
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - node_modules:/app/node_modules

volumes:
  postgres_data:
  node_modules:
